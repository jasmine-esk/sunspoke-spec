<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunspoke — Master Specification</title>
<meta name="description" content="Sunspoke master spec and roadmap. Internal document.">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #faf8f3;
    --bg-sidebar: #f3efe6;
    --text: #1a1a1a;
    --text-dim: #7a7268;
    --accent: #a67c3f;
    --border: #e3ddd0;
    --hover: #e9e3d5;
    --code-bg: #f0ebdf;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    font-weight: 400;
  }
  .container { display: flex; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    width: 320px;
    min-width: 320px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    padding: 40px 24px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .sidebar-title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px;
    font-weight: 500;
    margin: 0 0 4px 0;
    letter-spacing: -0.02em;
  }
  .sidebar-subtitle {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 32px;
  }
  .toc-heading {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin: 24px 0 12px 0;
    font-weight: 500;
  }
  .toc { list-style: none; padding: 0; margin: 0; }
  .toc li { margin: 0; }
  .toc a {
    display: block;
    padding: 8px 12px;
    color: var(--text);
    text-decoration: none;
    font-size: 14px;
    border-radius: 4px;
    transition: background 0.15s;
    font-weight: 400;
  }
  .toc a:hover { background: var(--hover); }
  .toc a.active {
    background: var(--hover);
    color: var(--accent);
    font-weight: 500;
  }
  .toc .toc-number {
    color: var(--text-dim);
    font-size: 11px;
    display: inline-block;
    width: 24px;
    font-variant-numeric: tabular-nums;
  }

  /* CONTENT */
  .content {
    flex: 1;
    padding: 56px 72px 120px;
    max-width: 820px;
  }
  .content h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 44px;
    font-weight: 500;
    letter-spacing: -0.02em;
    margin: 0 0 8px 0;
    line-height: 1.15;
  }
  .content h2 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.02em;
    margin: 64px 0 16px 0;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    line-height: 1.25;
    scroll-margin-top: 24px;
  }
  .content h3 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 20px;
    font-weight: 500;
    margin: 40px 0 12px 0;
    line-height: 1.3;
  }
  .content h4 {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin: 28px 0 12px 0;
  }
  .content p, .content li { font-size: 16px; }
  .content ul, .content ol { padding-left: 24px; margin: 16px 0; }
  .content li { margin: 6px 0; }
  .content a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.15s; }
  .content a:hover { border-bottom-color: var(--accent); }
  .content blockquote {
    border-left: 3px solid var(--accent);
    margin: 24px 0;
    padding: 4px 20px;
    color: var(--text-dim);
    font-style: italic;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 17px;
  }
  .content code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 14px;
  }
  .content pre {
    background: var(--code-bg);
    padding: 16px 20px;
    border-radius: 6px;
    overflow-x: auto;
    border: 1px solid var(--border);
  }
  .content pre code { background: transparent; padding: 0; font-size: 13px; }
  .content em { font-style: italic; font-family: 'Fraunces', Georgia, serif; }
  .content strong { font-weight: 600; }
  .content hr { border: none; border-top: 1px solid var(--border); margin: 40px 0; }
  .content table {
    width: 100%;
    border-collapse: collapse;
    margin: 24px 0;
    font-size: 14px;
  }
  .content th {
    text-align: left;
    padding: 10px 14px;
    background: var(--bg-sidebar);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }
  .content td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .content table tr:last-child td { border-bottom: none; }

  /* Comments section */
  .comments-section {
    margin-top: 96px;
    padding-top: 48px;
    border-top: 1px solid var(--border);
  }
  .comments-section h2 {
    border-top: none;
    padding-top: 0;
    margin-top: 0;
  }
  .comments-note {
    font-size: 14px;
    color: var(--text-dim);
    font-style: italic;
    font-family: 'Fraunces', Georgia, serif;
    margin-bottom: 32px;
  }

  /* Loading state */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 80vh;
    color: var(--text-dim);
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-size: 18px;
  }

  /* Mobile */
  @media (max-width: 900px) {
    .container { flex-direction: column; }
    .sidebar { width: 100%; height: auto; position: relative; padding: 24px; border-right: none; border-bottom: 1px solid var(--border); }
    .content { padding: 32px 24px 80px; }
    .content h1 { font-size: 32px; }
    .content h2 { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="container">
  <aside class="sidebar">
    <h1 class="sidebar-title">Sunspoke</h1>
    <div class="sidebar-subtitle">Master Spec · v0</div>
    <div class="toc-heading">Contents</div>
    <ul class="toc" id="toc"></ul>
  </aside>

  <main class="content">
    <div id="rendered" class="loading">Loading spec…</div>

    <section class="comments-section" id="comments">
      <h2>Comments & Feedback</h2>
      <p class="comments-note">Leave inline feedback below. Comments are reviewed and integrated into the spec periodically — sign in with GitHub to comment. Threaded discussions appear on the <a href="#" id="discussions-link">project Discussions page</a>.</p>
      <!-- GISCUS_PLACEHOLDER - will be replaced after repo is created -->
      <div id="giscus-container"></div>
    </section>
  </main>
</div>

<script>
  const renderer = new marked.Renderer();

  renderer.heading = function(text, level) {
    const slug = text.toLowerCase()
      .replace(/[^\w\s-]/g, '')
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-')
      .trim();
    const id = 'section-' + slug;
    return `<h${level} id="${id}">${text}</h${level}>`;
  };

  marked.setOptions({ renderer, breaks: false, gfm: true });

  async function loadSpec() {
    try {
      const res = await fetch('sunspoke-master-spec.md');
      if (!res.ok) throw new Error('Could not load spec');
      const md = await res.text();
      const html = marked.parse(md);
      document.getElementById('rendered').classList.remove('loading');
      document.getElementById('rendered').innerHTML = html;
      buildTOC();
      setupScrollSpy();
    } catch (e) {
      document.getElementById('rendered').innerHTML =
        '<p style="color: #7a7268; font-style: italic;">Could not load spec. Check that sunspoke-master-spec.md is in the same directory.</p>';
    }
  }

  function buildTOC() {
    const toc = document.getElementById('toc');
    const h2s = document.querySelectorAll('.content h2');
    h2s.forEach(h2 => {
      // Skip comments section from TOC
      if (h2.textContent.includes('Comments & Feedback')) return;

      const text = h2.textContent;
      const match = text.match(/^(\d+\.?)\s*(.+)$/);
      const number = match ? match[1] : '';
      const label = match ? match[2] : text;

      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = '#' + h2.id;
      a.dataset.target = h2.id;
      a.innerHTML = `<span class="toc-number">${number}</span>${label}`;
      li.appendChild(a);
      toc.appendChild(li);
    });
  }

  function setupScrollSpy() {
    const sections = document.querySelectorAll('.content h2');
    const links = document.querySelectorAll('#toc a');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const id = entry.target.id;
          links.forEach(link => {
            link.classList.toggle('active', link.dataset.target === id);
          });
        }
      });
    }, { rootMargin: '-20% 0px -70% 0px' });
    sections.forEach(section => observer.observe(section));
  }

  loadSpec();
</script>

</body>
</html>
